name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore backend/FlashShop.sln

      - name: Build
        run: dotnet build backend/FlashShop.sln --no-restore -c Release

      - name: Test
        run: dotnet test backend/FlashShop.sln --no-build -c Release --verbosity normal
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker
        run: docker build -t flashshop-api:ci ./backend

      - name: Build Frontend Docker
        run: |
          docker build -t flashshop-frontend:ci ./frontend \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost/api
